{% extends "base.html" %}

{% block main %}
  <h1 class="page-header">Uploaded Files</h1>

  {% include 'flash_messages.html' %}

    <div class = "img-gallery">
    {% for image in images %}
      
        <div class="gallery-file">
            <img src="{{ url_for('get_image', filename=image) }}" alt="{{ image }}" class="img-thumbnail">
            <p>{{ image }}</p>
        </div>
    {% endfor %}
    </div>
{% endblock %}

{% extends "base.html" %}

{% block main %}
  <h1 class="page-header">Uploaded Files</h1>

  {% include 'flash_messages.html' %}

  <ul>
    {% for image in images %}
      <li>
        <img src="{{ url_for('static', filename='uploads/' ~ image) }}" 
             alt="{{ image }}" class="img-thumbnail" style="max-width:200px;">
        <p>{{ image }}</p>
      </li>
    {% endfor %}
  </ul>
{% endblock %}
